<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DegradationVPN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Шапка с Lucky Star (замени фото) -->
        <div class="header">
            <img src="YOUR_LUCKY_STAR_LOGO_URL" alt="Lucky Star" class="logo" id="luckyLogo">
            <h1>DegradationVPN</h1>
        </div>

        <!-- Главное меню (3 кнопки + реклама) -->
        <div id="mainMenu" class="menu active">
            <button class="btn primary" onclick="sendToBot('buy')">Купить</button>
            <button class="btn secondary" onclick="sendToBot('casino')">Казино фек</button>
            <button class="btn support" onclick="sendToBot('support')">Связь с поддержкой</button>
            <div class="ad-banner" onclick="sendToBot('ad')">
                Здесь могла быть ваша реклама
            </div>
        </div>

        <!-- Меню покупки тарифов (просто список, описание убрано) -->
        <div id="buyMenu" class="menu hidden">
            <h2>Выберите тариф</h2>
            
            <div class="tariff-card" onclick="selectTariff(30, 20)">
                <div class="tariff-name">30гб - 20р</div>
            </div>
            
            <div class="tariff-card" onclick="selectTariff(100, 40)">
                <div class="tariff-name">100гб - 40р</div>
            </div>
            
            <div class="tariff-card" onclick="selectTariff(120, 105)">
                <div class="tariff-name">120гб - 105р</div>
            </div>
            
            <div class="tariff-card" onclick="selectTariff(150, 180)">
                <div class="tariff-name">150гб - 180р</div>
            </div>
            
            <button class="btn balance" onclick="sendToBot('topup')">Пополнить баланс</button>
            <button class="btn back" onclick="showMainMenu()">Назад</button>
        </div>

        <!-- Подтверждение покупки (упрощённое) -->
        <div id="confirmMenu" class="menu hidden">
            <h2>Подтверждение</h2>
            <div id="tariffDetails" class="tariff-details"></div>
            
            <button class="btn primary" onclick="confirmPayment()" id="confirmBtn">Оплатить</button>
            <button class="btn back" onclick="showBuyMenu()">Назад</button>
        </div>

        <!-- Казино фек (без эмодзи) -->
        <div id="casinoMenu" class="menu hidden">
            <h2>Казино фек</h2>
            
            <div class="slot-machine" id="slotMachine">
                <div class="slot" id="slot1">7</div>
                <div class="slot" id="slot2">7</div>
                <div class="slot" id="slot3">7</div>
            </div>
            
            <button class="btn spin" onclick="spinSlots()" id="spinButton">Крутить</button>
            <div id="casinoResult" class="casino-result"></div>
            
            <button class="btn back" onclick="showMainMenu()">Назад</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
