<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DegradationVPN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Шапка с Lucky Star -->
        <div class="header">
            <img src="https://i.ibb.co/gMSrc8wN/photo-1-2026-03-08-21-15-12.jpg" alt="Lucky Star" class="logo">
            <h1>DegradationVPN</h1>
        </div>

        <!-- Главное меню (3 кнопки) -->
        <div id="mainMenu" class="menu active">
            <button class="btn primary" onclick="App.showBuyMenu()">Купить</button>
            <button class="btn secondary" onclick="App.showCasinoMenu()">Казино фек</button>
            <button class="btn support" onclick="App.support()">Связь с поддержкой</button>
            <div class="ad-banner" onclick="App.ad()">
                Здесь могла быть ваша реклама
            </div>
        </div>

        <!-- Меню покупки тарифов -->
        <div id="buyMenu" class="menu hidden">
            <h2>Выберите тариф</h2>
            
            <div class="tariff-card" onclick="App.selectTariff(30, 20)">
                <div class="tariff-name">30гб - 20р</div>
                <div class="tariff-desc">Неделька, просто попробовать</div>
            </div>
            
            <div class="tariff-card" onclick="App.selectTariff(100, 40)">
                <div class="tariff-name">100гб - 40р</div>
                <div class="tariff-desc">Уже получше, купите еще (пж)</div>
            </div>
            
            <div class="tariff-card" onclick="App.selectTariff(120, 105)">
                <div class="tariff-name">120гб - 105р</div>
                <div class="tariff-desc">Стандарт, просто стандарт</div>
            </div>
            
            <div class="tariff-card" onclick="App.selectTariff(150, 180)">
                <div class="tariff-name">150гб - 180р</div>
                <div class="tariff-desc">Ого, самое дорогое что есть</div>
            </div>
            
            <button class="btn balance" onclick="App.topup()">Пополнить баланс</button>
            <button class="btn back" onclick="App.showMainMenu()">Назад</button>
        </div>

        <!-- Подтверждение покупки -->
        <div id="confirmMenu" class="menu hidden">
            <h2>Подтверждение</h2>
            <div id="tariffDetails" class="tariff-details"></div>
            <button class="btn primary" onclick="App.confirmPayment()">Оплатить</button>
            <button class="btn back" onclick="App.showBuyMenu()">Назад</button>
        </div>

        <!-- Казино (только эмодзи) -->
        <div id="casinoMenu" class="menu hidden">
            <h2>Казино фек</h2>
            
            <div class="slot-machine">
                <div class="slot" id="slot1">🍒</div>
                <div class="slot" id="slot2">🍒</div>
                <div class="slot" id="slot3">🍒</div>
            </div>
            
            <button class="btn spin" onclick="App.spin()">Крутить</button>
            
            <div id="winImage" class="win-image hidden"></div>
            <div id="casinoResult" class="casino-result"></div>
            
            <button class="btn back" onclick="App.showMainMenu()">Назад</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
